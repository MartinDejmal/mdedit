# Permissions for custom app commands exposed to the frontend.
# Referenced by src-tauri/capabilities/default.json.

[[permission]]
identifier = "allow-open-file-dialog"
description = "Allows invoking the open_file_dialog command."
commands.allow = ["open_file_dialog"]

[[permission]]
identifier = "allow-read-text-file"
description = "Allows invoking the read_text_file command."
commands.allow = ["read_text_file"]

[[permission]]
identifier = "allow-save-text-file"
description = "Allows invoking the save_text_file command."
commands.allow = ["save_text_file"]

[[permission]]
identifier = "allow-save-file-dialog"
description = "Allows invoking the save_file_dialog command."
commands.allow = ["save_file_dialog"]

[[permission]]
identifier = "allow-save-html-file-dialog"
description = "Allows invoking the save_html_file_dialog command."
commands.allow = ["save_html_file_dialog"]

[[permission]]
identifier = "allow-save-pdf-file-dialog"
description = "Allows invoking the save_pdf_file_dialog command."
commands.allow = ["save_pdf_file_dialog"]

[[permission]]
identifier = "allow-get-file-metadata"
description = "Allows invoking the get_file_metadata command."
commands.allow = ["get_file_metadata"]

[[permission]]
identifier = "allow-get-launch-args"
description = "Allows invoking the get_launch_args command."
commands.allow = ["get_launch_args"]
